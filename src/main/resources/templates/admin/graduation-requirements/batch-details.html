<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Graduation Requirements - Batch Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        .header-title {
            color: #003366;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .batch-info {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 5px solid #003366;
        }
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #dee2e6;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #003366;
        }
        .stat-label {
            color: #6c757d;
            font-size: 14px;
            margin-top: 5px;
        }
        .table-header {
            background-color: #003366;
            color: white;
            font-weight: 600;
        }
        .badge-success {
            background-color: #28a745;
            padding: 5px 10px;
            border-radius: 3px;
            color: white;
            font-size: 12px;
        }
        .badge-warning {
            background-color: #ffc107;
            padding: 5px 10px;
            border-radius: 3px;
            color: white;
            font-size: 12px;
        }
        .status-completed {
            color: #198754;
            font-weight: 600;
        }
        .status-incomplete {
            color: #fd7e14;
            font-weight: 600;
        }
        .table-hover tbody tr:hover {
            background-color: #f5f5f5;
        }
        .back-link {
            margin-bottom: 20px;
        }
        .header-with-back {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .requirement-cell {
            text-align: center;
            font-size: 16px;
        }
        .requirement-met {
            color: #198754;
        }
        .requirement-unmet {
            color: #fd7e14;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="header-with-back">
        <a href="/admin/graduation-requirements/batches" class="btn btn-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
        <h2 class="header-title mb-0">Graduation Requirements - Batch Details</h2>
    </div>

    <!-- Batch Information Card -->
    <div class="batch-info">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
            <div>
                <strong>Name:</strong> <span th:text="${batch.schemeDetails.spldesc}"></span>
            </div>
            <div>
                <strong>Batch:</strong> <span th:text="${batch.bchname}"></span>
            </div>
            <div>
                <strong>Capacity:</strong> <span th:text="${batch.bchcapacity}"></span>
            </div>
        </div>
    </div>

    <!-- Statistics Cards -->
    <div class="stats-container" th:if="${studentRequirements != null and !#lists.isEmpty(studentRequirements)}">
        <div class="stat-card">
            <div class="stat-value" th:text="${totalStudents}"></div>
            <div class="stat-label">Total Students</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" th:style="${completedCount > 0 ? 'color: #198754;' : 'color: #fd7e14;'}" 
                 th:text="${completedCount}"></div>
            <div class="stat-label">Completed Requirements</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" th:text="${#numbers.formatDecimal(completionPercentage, 1, 1)} + '%'"></div>
            <div class="stat-label">% Completion Rate</div>
        </div>
    </div>

    <!-- Students Table -->
    <div class="table-responsive">
        <table class="table table-hover table-bordered">
            <thead class="table-header">
            <tr>
                <th style="width: 8%;">Student ID</th>
                <th style="width: 20%;">Name</th>
                <th style="width: 12%;" class="text-center">Courses 
                    <br><small>(Min: <span th:text="${studentRequirements[0]?.minRequiredCourses}"></span>)</small>
                </th>
                <th style="width: 12%;" class="text-center">Credits 
                    <br><small>(Min: <span th:text="${studentRequirements[0]?.minRequiredCredits}"></span>)</small>
                </th>
                <th style="width: 10%;" class="text-center">Types Fulfilled 
                    <br><small>(Out of <span th:text="${studentRequirements[0]?.totalTypes}"></span>)</small>
                </th>
                <th style="width: 10%;" class="text-center">CPI 
                    <br><small>(Min: <span th:text="${studentRequirements[0]?.minRequiredCpi}"></span>)</small>
                </th>
                <th style="width: 18%;" class="text-center">Graduation Requirement</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="student : ${studentRequirements}">
                <td th:text="${student.stdinstid}"></td>
                <td th:text="${student.studentName}"></td>
                
                <!-- Courses Completed -->
                <td class="requirement-cell">
                    <div th:class="${student.coursesCompleted >= student.minRequiredCourses ? 'requirement-met' : 'requirement-unmet'}">
                        <strong th:text="${student.coursesCompleted}"></strong></span>
                    </div>
                </td>
                
                <!-- Credits Earned -->
                <td class="requirement-cell">
                    <div th:class="${student.creditsEarned >= student.minRequiredCredits ? 'requirement-met' : 'requirement-unmet'}">
                        <strong th:text="${student.creditsEarned}"></strong></span>
                    </div>
                </td>
                
                <!-- Types Fulfilled -->
                <td class="requirement-cell">
                    <div th:class="${student.typesFulfilled >= student.totalTypes ? 'requirement-met' : 'requirement-unmet'}">
                        <strong th:text="${student.typesFulfilled}"></strong></span>
                    </div>
                </td>
                
                <!-- CPI -->
                <td class="requirement-cell">
                    <div th:class="${student.cpi >= student.minRequiredCpi ? 'requirement-met' : 'requirement-unmet'}">
                        <strong th:text="${student.cpi}"></strong>
                    </div>
                </td>
                
                <!-- Graduation Status -->
                <td class="text-center">
                    <span th:if="${student.graduationStatus == 'Completed'}" class="'requirement-met'">
                        <div th:class="'requirement-met'">
                            <strong th:text="Completed"></strong>
                        </div>
                    </span>
                    <span th:if="${student.graduationStatus == 'Incomplete'}" class="'requirement-unmet'">
                        <div th:class="'requirement-unmet'">
                            <strong th:text="Incomplete"></strong>
                        </div>
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${#lists.isEmpty(studentRequirements)}" class="alert alert-warning" role="alert">
        No students found in this batch.
    </div>

</div>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
